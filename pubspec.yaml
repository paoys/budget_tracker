name: budget_tracker
description: "BudgetWise — Personal Finance & Savings Tracker with Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core:      ^3.6.0
  firebase_auth:      ^5.3.1
  cloud_firestore:    ^5.4.3
  google_sign_in:     ^6.2.1

  # State & Storage
  provider:           ^6.1.2
  shared_preferences: ^2.3.2

  # UI & Charts
  fl_chart:           ^0.69.0
  google_fonts:       ^6.2.1

  # Utilities
  intl:               ^0.19.0
  uuid:               ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
